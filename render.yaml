services:
  # ── Static site (main prmlrecords.com) ─────────────────────────────────────
  - type: web
    name: prmlrecords
    env: static
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /admin
        destination: /admin/index.html
      - type: rewrite
        source: /blog
        destination: /blog/index.html
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Checkout app (Next.js) ──────────────────────────────────────────────────
  - type: web
    name: prmlrecords-checkout
    env: node
    rootDir: checkout-app
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_STRIPE_PUBLIC_KEY
        sync: false   # set in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false   # set in Render dashboard
      - key: AIRTABLE_API_KEY
        sync: false   # set in Render dashboard
      - key: AIRTABLE_BASE_ID
        sync: false   # set in Render dashboard
      - key: BREVO_API_KEY
        sync: false   # set in Render dashboard
