<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ebe0"/>
      <stop offset="100%" style="stop-color:#E8E0CE"/>
    </linearGradient>
    <linearGradient id="card-beige" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6E8C3"/>
      <stop offset="100%" style="stop-color:#EDD9A3"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#2E2D2D" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-light)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="80" x2="600" y2="80" stroke="#2E2D2D" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="600" y2="160" stroke="#2E2D2D" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="600" y2="240" stroke="#2E2D2D" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="600" y2="320" stroke="#2E2D2D" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="400" stroke="#2E2D2D" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="400" stroke="#2E2D2D" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="400" stroke="#2E2D2D" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="400" stroke="#2E2D2D" stroke-width="0.5"/>
  </g>

  <!-- Red accent corner -->
  <rect x="0" y="0" width="4" height="400" fill="#FE0103" opacity="0.8"/>

  <!-- Card -->
  <g filter="url(#card-shadow)">
    <rect x="100" y="80" width="400" height="240" rx="16" fill="url(#card-beige)"/>
    <rect x="100" y="80" width="400" height="240" rx="16" fill="none" stroke="#2E2D2D" stroke-width="1" opacity="0.12"/>
    <rect x="100" y="80" width="400" height="1" rx="0" fill="#fff" opacity="0.6"/>
  </g>

  <!-- NFC symbol -->
  <g transform="translate(430,180)" opacity="0.6">
    <path d="M0,0 Q20,-30 0,-60" fill="none" stroke="#FE0103" stroke-width="3" stroke-linecap="round"/>
    <path d="M-10,0 Q16,-30 -10,-60" fill="none" stroke="#FE0103" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-20,0 Q12,-30 -20,-60" fill="none" stroke="#FE0103" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <circle cx="0" cy="0" r="4" fill="#FE0103"/>
  </g>

  <!-- PRML text on card -->
  <text x="130" y="145" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#FE0103" letter-spacing="4" opacity="0.9">PRML RECORDS</text>

  <!-- TAP CARD text -->
  <text x="130" y="240" font-family="'Courier New', monospace" font-size="28" font-weight="700" fill="#2E2D2D" letter-spacing="2" opacity="0.9">TAP CARD</text>

  <!-- Beige label -->
  <text x="130" y="268" font-family="'Courier New', monospace" font-size="10" fill="#635D52" letter-spacing="3" opacity="0.6">PRIMAL BEIGE</text>

  <!-- Chip mockup -->
  <rect x="130" y="155" width="44" height="34" rx="4" fill="#d4c49a" stroke="#b8a870" stroke-width="1"/>
  <line x1="148" y1="155" x2="148" y2="189" stroke="#b8a870" stroke-width="0.5" opacity="0.5"/>
  <line x1="158" y1="155" x2="158" y2="189" stroke="#b8a870" stroke-width="0.5" opacity="0.5"/>
  <line x1="130" y1="168" x2="174" y2="168" stroke="#b8a870" stroke-width="0.5" opacity="0.5"/>
  <line x1="130" y1="178" x2="174" y2="178" stroke="#b8a870" stroke-width="0.5" opacity="0.5"/>

  <!-- Bottom label -->
  <text x="300" y="385" font-family="'Courier New', monospace" font-size="9" fill="#635D52" letter-spacing="4" opacity="0.4" text-anchor="middle">ONE TAP. FULL IDENTITY.</text>
</svg>
