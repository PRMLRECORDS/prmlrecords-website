<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2E2D2D"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3939"/>
      <stop offset="100%" style="stop-color:#2E2D2D"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg-dark)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="600" y2="80" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="600" y2="160" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="600" y2="240" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="600" y2="320" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="400" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="400" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="400" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="400" stroke="#FE0103" stroke-width="0.5"/>
  </g>

  <!-- Red accent corner -->
  <rect x="0" y="0" width="4" height="400" fill="#FE0103" opacity="0.6"/>

  <!-- Card -->
  <g filter="url(#card-shadow)">
    <rect x="100" y="80" width="400" height="240" rx="16" fill="url(#card-grad)"/>
    <!-- Card border -->
    <rect x="100" y="80" width="400" height="240" rx="16" fill="none" stroke="#FE0103" stroke-width="1" opacity="0.3"/>
    <!-- Subtle inner glow top -->
    <rect x="100" y="80" width="400" height="1" rx="0" fill="#FE0103" opacity="0.15"/>
  </g>

  <!-- NFC symbol (center-right of card) -->
  <g transform="translate(430,180)" opacity="0.7">
    <path d="M0,0 Q20,-30 0,-60" fill="none" stroke="#FE0103" stroke-width="3" stroke-linecap="round"/>
    <path d="M-10,0 Q16,-30 -10,-60" fill="none" stroke="#FE0103" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-20,0 Q12,-30 -20,-60" fill="none" stroke="#FE0103" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <circle cx="0" cy="0" r="4" fill="#FE0103"/>
  </g>

  <!-- PRML text on card -->
  <text x="130" y="145" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#FE0103" letter-spacing="4" opacity="0.9">PRML RECORDS</text>

  <!-- TAP CARD text -->
  <text x="130" y="240" font-family="'Courier New', monospace" font-size="28" font-weight="700" fill="#F5F0E8" letter-spacing="2" opacity="0.95">TAP CARD</text>

  <!-- Charcoal label -->
  <text x="130" y="268" font-family="'Courier New', monospace" font-size="10" fill="#F5F0E8" letter-spacing="3" opacity="0.45">PRIMAL CHARCOAL</text>

  <!-- Chip mockup -->
  <rect x="130" y="155" width="44" height="34" rx="4" fill="#4a4845" stroke="#635D52" stroke-width="1"/>
  <line x1="148" y1="155" x2="148" y2="189" stroke="#635D52" stroke-width="0.5" opacity="0.5"/>
  <line x1="158" y1="155" x2="158" y2="189" stroke="#635D52" stroke-width="0.5" opacity="0.5"/>
  <line x1="130" y1="168" x2="174" y2="168" stroke="#635D52" stroke-width="0.5" opacity="0.5"/>
  <line x1="130" y1="178" x2="174" y2="178" stroke="#635D52" stroke-width="0.5" opacity="0.5"/>

  <!-- Bottom label -->
  <text x="300" y="385" font-family="'Courier New', monospace" font-size="9" fill="#F5F0E8" letter-spacing="4" opacity="0.3" text-anchor="middle">ONE TAP. FULL IDENTITY.</text>
</svg>
