<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#2E2D2D"/>
    </linearGradient>
    <filter id="key-shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg-dark)"/>

  <!-- Grid -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="600" y2="80" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="600" y2="160" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="600" y2="240" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="600" y2="320" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="400" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="400" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="400" stroke="#FE0103" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="400" stroke="#FE0103" stroke-width="0.5"/>
  </g>

  <rect x="0" y="0" width="4" height="400" fill="#FE0103" opacity="0.6"/>

  <!-- Keychain shape -->
  <g filter="url(#key-shadow)">
    <!-- Key fob — rounded rectangle -->
    <rect x="180" y="100" width="240" height="170" rx="24" fill="#2E2D2D"/>
    <rect x="180" y="100" width="240" height="170" rx="24" fill="none" stroke="#FE0103" stroke-width="1.5" opacity="0.35"/>
    <!-- Keyring hole -->
    <circle cx="300" cy="100" r="22" fill="#1a1a1a" stroke="#FE0103" stroke-width="1.5" opacity="0.4"/>
    <circle cx="300" cy="100" r="13" fill="#1a1a1a"/>
    <!-- Keyring -->
    <circle cx="300" cy="72" r="20" fill="none" stroke="#635D52" stroke-width="5" opacity="0.7"/>
  </g>

  <!-- NFC symbol centered on fob -->
  <g transform="translate(320,182)" opacity="0.7">
    <path d="M0,0 Q18,-26 0,-52" fill="none" stroke="#FE0103" stroke-width="3" stroke-linecap="round"/>
    <path d="M-10,0 Q14,-26 -10,-52" fill="none" stroke="#FE0103" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-20,0 Q10,-26 -20,-52" fill="none" stroke="#FE0103" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <circle cx="0" cy="0" r="4" fill="#FE0103"/>
  </g>

  <!-- PRML RECORDS label on fob -->
  <text x="300" y="148" font-family="'Courier New', monospace" font-size="10" font-weight="700" fill="#FE0103" letter-spacing="3" text-anchor="middle" opacity="0.9">PRML RECORDS</text>

  <!-- TAP KEY text -->
  <text x="300" y="242" font-family="'Courier New', monospace" font-size="26" font-weight="700" fill="#F5F0E8" letter-spacing="2" text-anchor="middle">TAP KEY</text>

  <!-- Color label -->
  <text x="300" y="262" font-family="'Courier New', monospace" font-size="9" fill="#F5F0E8" letter-spacing="3" opacity="0.45" text-anchor="middle">PRIMAL CHARCOAL</text>

  <!-- Keys hanging illustration -->
  <g opacity="0.2">
    <line x1="300" y1="92" x2="290" y2="330" stroke="#635D52" stroke-width="3"/>
    <ellipse cx="285" cy="340" rx="18" ry="12" fill="none" stroke="#635D52" stroke-width="2.5"/>
    <line x1="285" y1="340" x2="260" y2="365" stroke="#635D52" stroke-width="2" transform="rotate(-15,285,340)"/>
    <line x1="285" y1="340" x2="310" y2="365" stroke="#635D52" stroke-width="2"/>
  </g>

  <text x="300" y="390" font-family="'Courier New', monospace" font-size="9" fill="#F5F0E8" letter-spacing="4" opacity="0.3" text-anchor="middle">YOUR NETWORK ON YOUR KEYS.</text>
</svg>
