<div class="adm-wrap" id="goals-app" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:24px">
    <div class="page-hd" style="margin:0">
      <h1>90-Day Goals</h1>
      <p>Track progress toward your quarterly milestones</p>
    </div>
    <button class="btn btn-red" onclick="document.getElementById('goal-form-panel').style.display='block'">+ New Goal</button>
  </div>

  <!-- ADD / EDIT FORM -->
  <div class="panel panel--red" id="goal-form-panel" style="display:none;margin-bottom:20px">
    <div class="sec-hd">Goal Details</div>
    <input type="hidden" id="g-id">
    <div class="f-row">
      <div class="f-field"><label class="f-label">Goal *</label><input class="f-input" id="g-goal" placeholder="What do you want to achieve?"></div>
      <div class="f-field"><label class="f-label">Category</label><input class="f-input" id="g-category" placeholder="Marketing / Tech / Business..."></div>
    </div>
    <div class="f-row">
      <div class="f-field"><label class="f-label">Target Date</label><input type="date" class="f-input" id="g-target"></div>
      <div class="f-field"><label class="f-label">Status</label>
        <select class="f-select" id="g-status">
          <option>In Progress</option><option>Not Started</option><option>Blocked</option><option>Complete</option>
        </select>
      </div>
    </div>
    <div class="f-row">
      <div class="f-field"><label class="f-label">Progress: <span id="g-pct">0</span>%</label>
        <input type="range" id="g-progress" min="0" max="100" value="0" style="width:100%;accent-color:var(--red)" oninput="document.getElementById('g-pct').textContent=this.value">
      </div>
      <div></div>
    </div>
    <div class="f-field"><label class="f-label">Milestones / Steps</label>
      <textarea class="f-textarea" id="g-milestones" style="min-height:60px" placeholder="Step 1 Â· Step 2 Â· Step 3"></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-red" onclick="saveGoalForm()">Save Goal</button>
      <button class="btn btn-out" onclick="clearGoalForm()">Cancel</button>
    </div>
  </div>

  <div id="goals-list"><div style="opacity:.35;font-size:13px;padding:20px 0">Loading goals...</div></div>
</div>

<script src="../js/admin-auth.js"></script>
<script>
const GAS_URL = localStorage.getItem('prml_gas_url') || 'https://script.google.com/macros/s/AKfycbzlXsUJFb36zh58jc2-N54Cmfhgh4EC478OzKehJG56qeNcZRSzFmOAU4PBHEgVdzsLyQ/exec';
let goals = [];

async function onAdminReady(){
  await loadGoals();
  document.getElementById('goals-app').style.display='block';
}

async function loadGoals(){
  const data = GAS_URL.includes('PASTE_YOUR') ? null : await fetch(GAS_URL+'?action=getGoals').then(r=>r.json()).catch(()=>null);
  goals = data?.goals || getSampleGoals();
  renderGoals();
}

function getSampleGoals(){
  return [
    {id:1,goal:'Launch blog with 5 posts',category:'Marketing',target:'2025-06-30',progress:60,status:'In Progress',milestones:'Draft 5 posts Â· Publish 2 Â· Set up blog index'},
    {id:2,goal:'Connect Stripe to site',category:'Tech',target:'2025-04-15',progress:80,status:'In Progress',milestones:'Create account Â· Build payment link Â· Add to main.js'},
    {id:3,goal:'Apply for 3 grants',category:'Business',target:'2025-07-01',progress:33,status:'In Progress',milestones:'MWBE cert Â· SBDC application Â· Atlanta grant'},
    {id:4,goal:'100 email list subscribers',category:'Marketing',target:'2025-08-01',progress:20,status:'In Progress',milestones:'Add email strip Â· 20 subs Â· 50 subs Â· 100 subs'},
  ];
}

function renderGoals(){
  const el = document.getElementById('goals-list');
  if(!goals.length){el.innerHTML='<div class="status status-info">No goals yet. Add your first 90-day goal.</div>';return;}
  const byCategory = {};
  goals.forEach(g=>{ (byCategory[g.category||'General'] = byCategory[g.category||'General']||[]).push(g); });
  el.innerHTML = Object.entries(byCategory).map(([cat,items])=>`
    <div style="margin-bottom:28px">
      <div class="sec-hd">${cat}</div>
      ${items.map(g=>`
        <div class="panel panel--red" style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
            <div style="flex:1">
              <div style="font-family:'Odibee Sans',sans-serif;font-size:13px;letter-spacing:1px;color:var(--cream);margin-bottom:4px">${g.goal}</div>
              ${g.milestones?`<div style="font-size:12px;opacity:.45;margin-bottom:8px">${g.milestones}</div>`:''}
              <div style="display:flex;align-items:center;gap:10px">
                <div style="flex:1">
                  <div class="progress-wrap"><div class="progress-bar" style="width:${g.progress||0}%"></div></div>
                </div>
                <span style="font-family:'Rubik Mono One',monospace;font-size:14px;color:var(--red)">${g.progress||0}%</span>
              </div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div class="badge ${g.status==='Complete'?'badge--green':g.status==='Blocked'?'badge--red':'badge--yellow'}">${g.status||'Active'}</div>
              ${g.target?`<div style="font-size:11px;opacity:.4;margin-top:4px">Due ${g.target}</div>`:''}
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-sm btn-out" onclick="editGoal(${g.id})">Edit</button>
            <input type="range" min="0" max="100" value="${g.progress||0}" style="flex:1;accent-color:var(--red)" 
              onchange="updateProgress(${g.id},this.value)" oninput="this.nextElementSibling.textContent=this.value+'%'">
            <span style="font-size:11px;opacity:.5;min-width:32px">${g.progress||0}%</span>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function updateProgress(id, val){
  const g = goals.find(g=>g.id===id);
  if(g){ g.progress=parseInt(val); saveGoals(); }
}

function saveGoals(){
  if(!GAS_URL.includes('PASTE_YOUR')){
    goals.forEach(g=>{
      fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({type:'UPDATE_GOAL',...g})});
    });
  }
}

function editGoal(id){
  const g = goals.find(g=>g.id===id);
  if(!g) return;
  document.getElementById('g-goal').value=g.goal||'';
  document.getElementById('g-category').value=g.category||'';
  document.getElementById('g-target').value=g.target||'';
  document.getElementById('g-progress').value=g.progress||0;
  document.getElementById('g-milestones').value=g.milestones||'';
  document.getElementById('g-status').value=g.status||'In Progress';
  document.getElementById('g-id').value=g.id;
  document.getElementById('goal-form-panel').style.display='block';
}

function clearGoalForm(){
  ['g-goal','g-category','g-target','g-milestones'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('g-progress').value=0;
  document.getElementById('g-status').value='In Progress';
  document.getElementById('g-id').value='';
  document.getElementById('goal-form-panel').style.display='none';
}

function saveGoalForm(){
  const id = document.getElementById('g-id').value;
  const data = {
    id: id ? parseInt(id) : Date.now(),
    goal: document.getElementById('g-goal').value,
    category: document.getElementById('g-category').value,
    target: document.getElementById('g-target').value,
    progress: parseInt(document.getElementById('g-progress').value)||0,
    milestones: document.getElementById('g-milestones').value,
    status: document.getElementById('g-status').value,
  };
  if(id){ const i=goals.findIndex(g=>g.id===parseInt(id)); if(i>=0) goals[i]=data; }
  else goals.push(data);
  if(!GAS_URL.includes('PASTE_YOUR')){
    fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'GOAL',ts:new Date().toISOString(),...data})});
  }
  renderGoals();
  clearGoalForm();
}
</script>
<script src="/js/cache-bust.js" defer></script>
