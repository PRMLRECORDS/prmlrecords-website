<div class="adm-wrap">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:24px">
    <div class="page-hd" style="margin:0"><h1>Blog Manager</h1><p>Create, edit, and publish posts</p></div>
    <button class="btn btn-red" onclick="newPost()">+ New Post</button>
  </div>

  <div class="split" style="align-items:start">
    <!-- POST LIST -->
    <div>
      <div class="sec-hd">All Posts</div>
      <div id="post-list"><div style="opacity:.35;font-size:13px">Loading...</div></div>
    </div>

    <!-- EDITOR -->
    <div id="editor-panel" style="display:none">
      <div class="panel panel--red">
        <div class="sec-hd">Post Editor</div>
        <div class="f-field"><label class="f-label">Title *</label>
          <input class="f-input" id="p-title" placeholder="Post title" onblur="autoSlug()">
        </div>
        <div class="f-row">
          <div class="f-field"><label class="f-label">Slug (URL)</label>
            <input class="f-input" id="p-slug" placeholder="url-friendly-slug">
          </div>
          <div class="f-field"><label class="f-label">Category</label>
            <input class="f-input" id="p-category" placeholder="News / Tips / Studio...">
          </div>
        </div>
        <div class="f-row">
          <div class="f-field"><label class="f-label">Author</label>
            <input class="f-input" id="p-author" placeholder="PRML Records">
          </div>
          <div class="f-field"><label class="f-label">Featured Image URL</label>
            <input class="f-input" id="p-image" placeholder="https://...">
          </div>
        </div>
        <div class="f-field"><label class="f-label">Excerpt</label>
          <textarea class="f-textarea" id="p-excerpt" style="min-height:60px" placeholder="One or two sentences shown on listings and homepage..."></textarea>
        </div>
        <div class="f-field"><label class="f-label">Content</label>
          <textarea class="f-textarea" id="p-content" style="min-height:200px" placeholder="Write your full post here. HTML is supported.&#10;&#10;Use &lt;h2&gt;, &lt;p&gt;, &lt;ul&gt; for formatting."></textarea>
        </div>
        <div class="f-row">
          <div class="f-field"><label class="f-label">SEO Title</label><input class="f-input" id="p-seo-title" placeholder="Override title for search results"></div>
          <div class="f-field"><label class="f-label">SEO Description</label><input class="f-input" id="p-seo-desc" placeholder="Short description for Google"></div>
        </div>
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
            <input type="checkbox" id="p-published" style="accent-color:var(--red)"> Published (live on site)
          </label>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-red" id="save-btn" onclick="savePost()">Save</button>
          <button class="btn btn-out" onclick="savePost(true)">Save & Publish</button>
          <button class="btn btn-out" onclick="document.getElementById('editor-panel').style.display='none'">Cancel</button>
        </div>
        <div id="save-status" style="margin-top:10px"></div>
      </div>

      <!-- AI SOCIAL GENERATION -->
      <div class="panel" style="margin-top:0">
        <div class="sec-hd">AI: Generate Social Captions</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">
          <button class="btn btn-sm btn-out" onclick="generateSocial('ig')">Instagram</button>
          <button class="btn btn-sm btn-out" onclick="generateSocial('fb')">Facebook</button>
          <button class="btn btn-sm btn-out" onclick="generateSocial('x')">X / Twitter</button>
          <button class="btn btn-sm btn-out" onclick="generateSocial('li')">LinkedIn</button>
          <button class="btn btn-sm btn-red" id="gen-btn" onclick="generateSocial(aiTab)">Generate</button>
        </div>
        <div id="ai-output"></div>
      </div>
    </div>
  </div>
</div>

<script src="../js/admin-auth.js"></script>
<script>
const GAS_URL = localStorage.getItem('prml_gas_url') || 'https://script.google.com/macros/s/AKfycbzlXsUJFb36zh58jc2-N54Cmfhgh4EC478OzKehJG56qeNcZRSzFmOAU4PBHEgVdzsLyQ/exec';
let posts = [];
let editingId = null;
let aiTab = 'ig';

async function onAdminReady(){
  await loadPosts();
}

async function loadPosts(){
  const data = GAS_URL.includes('PASTE_YOUR') ? null : await fetch(GAS_URL+'?action=getPosts&limit=50').then(r=>r.json()).catch(()=>null);
  posts = data?.posts || [];
  renderPostList();
}

function renderPostList(){
  const el = document.getElementById('post-list');
  if(!posts.length){ el.innerHTML='<div style="opacity:.35;font-size:13px;padding:16px 0">No posts yet. Click New Post to create your first.</div>'; return; }
  el.innerHTML = posts.map(p=>`
    <div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)">
      <span class="badge ${p.published?'badge--green':'badge--gray'}">${p.published?'Live':'Draft'}</span>
      <div style="flex:1">
        <div style="font-size:13px;color:var(--cream)">${p.title||'Untitled'}</div>
        <div style="font-size:11px;opacity:.35">${p.date||''} ${p.category?'Â· '+p.category:''}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-out" onclick="editPost('${p.id}')">Edit</button>
        <button class="btn btn-sm btn-out" onclick="deletePost('${p.id}')">Del</button>
        ${p.published?`<a href="../blog/${p.slug||p.id}.html" target="_blank" class="btn btn-sm btn-out">View â†—</a>`:''}
      </div>
    </div>`).join('');
}

function newPost(){
  editingId = null;
  ['p-title','p-slug','p-excerpt','p-content','p-image','p-author','p-category','p-seo-title','p-seo-desc'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.value='';
  });
  document.getElementById('p-published').checked = false;
  document.getElementById('editor-panel').style.display='block';
  document.getElementById('p-title').focus();
  document.getElementById('ai-output').innerHTML='';
}

function editPost(id){
  const p = posts.find(p=>p.id==id);
  if(!p) return;
  editingId = id;
  document.getElementById('p-title').value = p.title||'';
  document.getElementById('p-slug').value = p.slug||'';
  document.getElementById('p-excerpt').value = p.excerpt||'';
  document.getElementById('p-content').value = p.content||'';
  document.getElementById('p-image').value = p.image||'';
  document.getElementById('p-author').value = p.author||'';
  document.getElementById('p-category').value = p.category||'';
  document.getElementById('p-published').checked = !!p.published;
  document.getElementById('editor-panel').style.display='block';
}

function autoSlug(){
  const title = document.getElementById('p-title').value;
  document.getElementById('p-slug').value = title.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

async function savePost(publish){
  const title = document.getElementById('p-title').value.trim();
  if(!title){ alert('Title is required.'); return; }
  const post = {
    id: editingId || 'post-'+Date.now(),
    title,
    slug: document.getElementById('p-slug').value || title.toLowerCase().replace(/[^a-z0-9]+/g,'-'),
    excerpt: document.getElementById('p-excerpt').value,
    content: document.getElementById('p-content').value,
    image: document.getElementById('p-image').value,
    author: document.getElementById('p-author').value,
    category: document.getElementById('p-category').value,
    published: publish !== undefined ? publish : document.getElementById('p-published').checked,
    date: new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),
    seo_title: document.getElementById('p-seo-title')?.value,
    seo_desc: document.getElementById('p-seo-desc')?.value,
  };

  const btn = document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Saving...';

  if(!GAS_URL.includes('PASTE_YOUR')){
    try{
      await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({type:'CREATE_POST',ts:new Date().toISOString(),...post})});
    }catch(e){}
  }

  if(editingId){ const i=posts.findIndex(p=>p.id==editingId); if(i>=0) posts[i]=post; }
  else posts.unshift(post);
  renderPostList();
  document.getElementById('save-status').className='status status-ok';
  document.getElementById('save-status').textContent='âœ“ Saved'+(post.published?' and published.':' as draft.');
  btn.disabled=false; btn.textContent='Save';
}

function deletePost(id){
  if(!confirm('Delete this post?')) return;
  posts = posts.filter(p=>p.id!=id);
  if(!GAS_URL.includes('PASTE_YOUR'))
    fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'DELETE_POST',id})});
  renderPostList();
}

/* AI SOCIAL GENERATION */
async function generateSocial(platform){
  aiTab = platform;
  const title = document.getElementById('p-title').value.trim();
  const content = document.getElementById('p-content').value.trim().slice(0,500);
  if(!title){ alert('Enter a post title first.'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled=true; btn.textContent='Generating...';

  const prompts = {
    ig: `Write 3 Instagram caption options for a blog post titled "${title}" from PRML Records LLC (Black-owned creative company, West End Atlanta). Include relevant hashtags. Each option max 2-3 sentences.`,
    fb: `Write a Facebook post for a blog post titled "${title}" from PRML Records LLC. 2-3 sentences, conversational but professional.`,
    x: `Write 3 X/Twitter post options (max 280 chars each) for a blog post: "${title}" — PRML Records LLC, West End Atlanta.`,
    li: `Write a LinkedIn post for PRML Records LLC announcing a new blog post: "${title}". Professional tone, 3-4 sentences. Include a call to action.`,
  };

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:prompts[platform]||prompts.ig}]})
    });
    const d = await res.json();
    document.getElementById('ai-output').innerHTML = `
      <div style="font-family:'Odibee Sans',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:10px">${{ig:'Instagram',fb:'Facebook',x:'X / Twitter',li:'LinkedIn'}[platform]}</div>
      <div style="font-size:13px;line-height:1.8;white-space:pre-wrap;color:var(--cream);opacity:.85">${d.content?.[0]?.text||''}</div>
      <button class="btn btn-sm btn-out" style="margin-top:12px" onclick="navigator.clipboard.writeText(document.getElementById('ai-output').querySelector('div:last-child').textContent)">Copy</button>`;
  } catch(e){ document.getElementById('ai-output').innerHTML='<div class="status status-err">AI unavailable. Check API connection in Settings.</div>'; }
  btn.disabled=false; btn.textContent='Generate';
}
</script>
