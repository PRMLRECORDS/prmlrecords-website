<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<title>Competitors | The Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Odibee+Sans&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/admin.css">
<style>
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:2px;background:var(--charcoal);margin-bottom:20px}
.comp-card{background:var(--black);padding:22px}
.comp-name{font-family:'Rubik Mono One',monospace;font-size:18px;color:var(--cream);letter-spacing:-0.5px;margin-bottom:4px}
.comp-type{font-family:'Odibee Sans',sans-serif;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--cream);opacity:.3;margin-bottom:14px}
.comp-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.comp-stat{background:var(--charcoal);padding:10px 12px}
.comp-stat-val{font-family:'Rubik Mono One',monospace;font-size:16px;color:var(--red)}
.comp-stat-lbl{font-family:'Odibee Sans',sans-serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--cream);opacity:.3;margin-top:2px}
.comp-notes{font-family:'Roboto Slab',serif;font-size:12px;font-weight:300;color:var(--cream);opacity:.5;line-height:1.6;margin-bottom:14px}
.comp-analysis{background:rgba(224,16,16,.05);border-left:3px solid var(--red);padding:12px 14px;margin-top:12px;font-family:'Roboto Slab',serif;font-size:12px;font-weight:300;color:var(--cream);line-height:1.7;white-space:pre-wrap;display:none}
.comp-analysis.visible{display:block}
.trend-up{color:#22c55e}
.trend-dn{color:var(--red)}
.trend-flat{color:var(--cream);opacity:.4}
.add-form{background:var(--charcoal);padding:24px;margin-bottom:20px}
</style>
</head>
<body>
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-title">The Dashboard</div><div class="login-sub">Restricted Access</div>
    <div class="f-field"><label class="f-label">Password</label><input type="password" class="f-input" id="pw" placeholder="Admin password" onkeydown="if(event.key==='Enter')tryLogin()"></div>
    <button class="btn btn-red" style="width:100%;margin-top:4px" onclick="tryLogin()">Enter â†’</button>
    <div id="pw-err" style="display:none;margin-top:10px;font-size:12px;color:var(--red)">Wrong password.</div>
  </div>
</div>

<nav class="adm-nav">
  <a class="adm-brand" href="index.html"><span>The <em>Dashboard</em></span></a>
  <div class="adm-nav-links">
    <a href="index.html" class="anl">Dashboard</a>
    <a href="analytics.html" class="anl">Analytics</a>
    <a href="social.html" class="anl">Social</a>
    <a href="ai.html" class="anl">âœ¦ AI</a>
    <a href="news.html" class="anl">News</a>
    <a href="competitors.html" class="anl active">Competitors</a>
    <a href="goals.html" class="anl">Goals</a>
    <a href="grants.html" class="anl">Grants</a>
    <a href="invoice.html" class="anl">Invoice</a>
    <a href="settings.html" class="anl anl--ext">Settings</a>
  </div>
</nav>

<div class="adm-wrap" id="main-content" style="display:none">
  <div class="page-hd" style="display:flex;align-items:flex-start;justify-content:space-between">
    <div>
      <h1>Competitor Tracker</h1>
      <p>Monitor peers, labels &amp; artists — Claude analyzes strategy on demand</p>
    </div>
    <button class="btn btn-red btn-sm" style="margin-top:8px" onclick="toggleAddForm()">+ Add Competitor</button>
  </div>

  <!-- ADD FORM -->
  <div class="add-form" id="add-form" style="display:none">
    <div class="sec-hd">Add Competitor / Peer</div>
    <div class="split" style="margin-bottom:12px">
      <div class="f-field" style="margin:0">
        <label class="f-label">Name</label>
        <input class="f-input" id="new-name" placeholder="Label name, artist, or company">
      </div>
      <div class="f-field" style="margin:0">
        <label class="f-label">Type</label>
        <select class="f-select" id="new-type">
          <option>Indie Label</option>
          <option>Artist</option>
          <option>Studio</option>
          <option>Agency</option>
          <option>Distributor</option>
        </select>
      </div>
    </div>
    <div class="split" style="margin-bottom:12px">
      <div class="f-field" style="margin:0">
        <label class="f-label">Instagram Followers</label>
        <input class="f-input" id="new-ig" placeholder="e.g. 12.4K">
      </div>
      <div class="f-field" style="margin:0">
        <label class="f-label">Monthly Listeners</label>
        <input class="f-input" id="new-streams" placeholder="e.g. 8,200">
      </div>
    </div>
    <div class="f-field">
      <label class="f-label">Notes (optional)</label>
      <textarea class="f-textarea" id="new-notes" placeholder="What they do well, recent releases, strategies you've noticed..." style="min-height:60px"></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-red btn-sm" onclick="addCompetitor()">Add â†’</button>
      <button class="btn btn-out btn-sm" onclick="toggleAddForm()">Cancel</button>
    </div>
  </div>

  <!-- COMPETITOR CARDS -->
  <div class="comp-grid" id="comp-grid"></div>
</div>

<script src="js/claude-admin.js"></script>
<script>
const PASS = 'PRMLp369!';
function tryLogin() {
  if (document.getElementById('pw').value === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    renderCompetitors();
  } else {
    document.getElementById('pw-err').style.display = 'block';
  }
}

const STORAGE_KEY = 'prml_competitors';

const DEFAULT_COMPETITORS = [
  { name: 'LVRN', type: 'Indie Label', ig: '185K', streams: '2.1M', trend: 'up', notes: 'Atlanta-based label (6LACK, Summer Walker, Mereba). Strong artist development and aesthetic brand.' },
  { name: 'Dreamville', type: 'Indie Label', ig: '1.2M', streams: '18M', trend: 'up', notes: 'J. Cole\'s label. Benchmark for independent label credibility and artist freedom. Compilation strategy.' },
  { name: 'Empire Distribution', type: 'Distributor', ig: '420K', streams: '45M', trend: 'flat', notes: 'Large indie distributor/label hybrid. Good benchmark for distribution deals and services pricing.' },
];

function loadCompetitors() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || DEFAULT_COMPETITORS; }
  catch { return DEFAULT_COMPETITORS; }
}

function saveCompetitors(comps) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(comps));
}

function trendIcon(t) {
  if (t === 'up') return '<span class="trend-up">â†‘ Growing</span>';
  if (t === 'down') return '<span class="trend-dn">â†“ Declining</span>';
  return '<span class="trend-flat">â†’ Stable</span>';
}

function renderCompetitors() {
  const comps = loadCompetitors();
  const grid = document.getElementById('comp-grid');
  grid.innerHTML = '';
  comps.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'comp-card';
    card.id = `comp-${i}`;
    card.innerHTML = `
      <div class="comp-name">${c.name}</div>
      <div class="comp-type">${c.type} Â· ${trendIcon(c.trend || 'flat')}</div>
      <div class="comp-stats">
        <div class="comp-stat"><div class="comp-stat-val">${c.ig || '—'}</div><div class="comp-stat-lbl">IG Followers</div></div>
        <div class="comp-stat"><div class="comp-stat-val">${c.streams || '—'}</div><div class="comp-stat-lbl">Monthly Streams</div></div>
      </div>
      ${c.notes ? `<div class="comp-notes">${c.notes}</div>` : ''}
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-red btn-sm" id="analyze-btn-${i}" onclick="analyzeComp(${i})">âš¡ Analyze Strategy</button>
        <button class="btn btn-out btn-sm" onclick="removeComp(${i})">Remove</button>
      </div>
      <div class="comp-analysis" id="analysis-${i}"></div>
    `;
    grid.appendChild(card);
  });
}

async function analyzeComp(i) {
  if (!ClaudeAdmin.requireKey()) return;
  const comps = loadCompetitors();
  const c = comps[i];
  const btn = document.getElementById(`analyze-btn-${i}`);
  ClaudeAdmin.setLoading(btn, true);
  try {
    const text = await ClaudeAdmin.analyzeCompetitor(c.name, c.notes || '');
    const box = document.getElementById(`analysis-${i}`);
    box.textContent = text;
    box.classList.add('visible');
  } catch (e) {
    const box = document.getElementById(`analysis-${i}`);
    box.textContent = 'âš ï¸ ' + e.message;
    box.classList.add('visible');
  }
  ClaudeAdmin.setLoading(btn, false, 'âš¡ Analyze Strategy');
}

function toggleAddForm() {
  const f = document.getElementById('add-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function addCompetitor() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const comps = loadCompetitors();
  comps.push({
    name,
    type: document.getElementById('new-type').value,
    ig: document.getElementById('new-ig').value.trim() || '—',
    streams: document.getElementById('new-streams').value.trim() || '—',
    trend: 'flat',
    notes: document.getElementById('new-notes').value.trim(),
  });
  saveCompetitors(comps);
  renderCompetitors();
  toggleAddForm();
  ['new-name','new-ig','new-streams','new-notes'].forEach(id => document.getElementById(id).value = '');
}

function removeComp(i) {
  if (!confirm('Remove this competitor?')) return;
  const comps = loadCompetitors();
  comps.splice(i, 1);
  saveCompetitors(comps);
  renderCompetitors();
}
</script>
<script src="/js/cache-bust.js" defer></script>
</body>
</html>
